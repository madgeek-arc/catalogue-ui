<section>
<!--  <h6 class="uk-flex uk-flex-middle"><span class="material-symbols-outlined uk-margin-small-right">chat</span> Create New Question</h6>-->
  <div class="uk-flex uk-flex-middle uk-text-bold uk-margin-bottom"><span class="material-symbols-outlined uk-margin-small-right">chat</span> Create New Question</div>

  <div class="uk-margin-bottom">
    <div class="uk-text-muted uk-text-small uk-margin-bottom">Text field</div>
    <a class="uk-flex uk-flex-middle uk-text-decoration-none" (click)="addField(FieldType.string)">
      <span class="material-symbols-outlined uk-margin-small-right">horizontal_rule</span>Simple input
    </a>
    <a class="uk-flex uk-flex-middle uk-text-decoration-none" (click)="addField(FieldType.richText)">
      <span class="material-symbols-outlined uk-margin-small-right">data_object</span>Rich text
    </a>
    <a class="uk-flex uk-flex-middle uk-text-decoration-none" (click)="addField(FieldType.largeText)">
      <span class="material-symbols-outlined uk-margin-small-right">dehaze</span>Text area
    </a>
  </div>

  <div class="uk-margin-bottom">
    <div class="uk-text-muted uk-text-small uk-margin-bottom">Choices</div>
    <a class="uk-flex uk-flex-middle uk-text-decoration-none" (click)="addField(FieldType.radio)">
      <span class="material-symbols-outlined uk-margin-small-right">radio_button_checked</span>Radio
    </a>
    <a class="uk-flex uk-flex-middle uk-text-decoration-none" (click)="addField(FieldType.select)">
      <span class="material-symbols-outlined uk-margin-small-right">arrow_drop_down_circle</span>Select
    </a>
  </div>
